<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia's Coffee Varieties — A Flippable Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a08;
  --paper:#f4efe6;
  --paper-edge:#d4cbb8;
  --ink:#1a1612;
  --ink-muted:#5a4f3e;
  --accent:#b8703a;
  --accent-light:#d4945a;
  --green-blue:#4a7a6a;
  --earth:#6b4226;
  --gold:#c9a84c;
}
html{font-size:16px}
body{
  background:var(--bg);
  font-family:'Cormorant Garamond',Georgia,serif;
  color:var(--ink);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 30%,rgba(74,122,106,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 70%,rgba(184,112,58,.06) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

.scene{
  position:relative;
  width:min(920px,92vw);
  height:min(640px,80vh);
  perspective:1800px;
  z-index:1;
}

.book{
  position:absolute;
  width:50%;height:100%;
  right:0;
  transform-style:preserve-3d;
}

.page{
  position:absolute;inset:0;
  transform-origin:left center;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,.0,.2,1);
  cursor:pointer;
}
.page.flipped{
  transform:rotateY(-180deg);
}
.page .face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  background:var(--paper);
  padding:clamp(20px,3.5vw,40px) clamp(22px,4.5vw,48px);
  overflow-y:auto;
  border-radius:0 4px 4px 0;
  box-shadow:inset -6px 0 12px rgba(0,0,0,.06),2px 0 8px rgba(0,0,0,.15);
  scrollbar-width:thin;
  scrollbar-color:var(--paper-edge) transparent;
}
.page .face::-webkit-scrollbar{width:5px}
.page .face::-webkit-scrollbar-thumb{background:var(--paper-edge);border-radius:4px}
.page .face.back{
  transform:rotateY(180deg);
  box-shadow:inset 6px 0 12px rgba(0,0,0,.06),-2px 0 8px rgba(0,0,0,.15);
}

.page-left{
  position:absolute;left:0;top:0;
  width:50%;height:100%;
  background:var(--paper);
  padding:clamp(20px,3.5vw,40px) clamp(22px,4.5vw,48px);
  overflow-y:auto;
  border-radius:4px 0 0 4px;
  box-shadow:inset 6px 0 12px rgba(0,0,0,.04),-2px 0 8px rgba(0,0,0,.1);
  scrollbar-width:thin;
  scrollbar-color:var(--paper-edge) transparent;
}
.page-left::-webkit-scrollbar{width:5px}
.page-left::-webkit-scrollbar-thumb{background:var(--paper-edge);border-radius:4px}

.spine{
  position:absolute;left:50%;top:0;bottom:0;
  width:3px;
  background:linear-gradient(to bottom,var(--paper-edge),#a09480,var(--paper-edge));
  z-index:10;
  transform:translateX(-50%);
  box-shadow:0 0 10px rgba(0,0,0,.15);
}

.page .face::before,.page-left::before{
  content:'';position:absolute;top:10px;bottom:10px;
  border:1px solid rgba(180,168,148,.3);
  pointer-events:none;
}
.page .face::before{left:16px;right:12px}
.page .face.back::before{left:12px;right:16px}
.page-left::before{left:12px;right:16px}

.page-num{
  position:absolute;bottom:14px;
  font-family:'DM Mono',monospace;font-size:.65rem;
  color:var(--ink-muted);letter-spacing:.04em;
}
.page .face .page-num.right{right:28px}
.page .face.back .page-num.left{left:28px}
.page-left .page-num.left{left:28px}

/* ── typography ── */
h1.cover-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.8rem,4.5vw,3rem);
  font-weight:800;line-height:1.05;letter-spacing:-.03em;
  color:var(--ink);margin-bottom:.35em;
}
h2{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.05rem,2.4vw,1.45rem);
  font-weight:700;color:var(--earth);
  margin-bottom:.25em;letter-spacing:-.015em;line-height:1.2;
}
h3{
  font-family:'Syne',sans-serif;
  font-size:.92rem;font-weight:600;
  color:var(--accent);margin:.7em 0 .15em;
}
p,.desc{
  font-size:clamp(.85rem,1.35vw,.98rem);
  line-height:1.5;color:var(--ink-muted);margin-bottom:.4em;
}
.subtitle{
  font-family:'DM Mono',monospace;
  font-size:.7rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);margin-bottom:.6em;
}
.region-label{
  font-family:'DM Mono',monospace;
  font-size:.62rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--green-blue);
  display:inline-block;
  border:1px solid var(--green-blue);
  padding:1px 8px;border-radius:2px;margin-bottom:.4em;
}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin:.4em 0}
.tag{
  font-family:'DM Mono',monospace;
  font-size:.58rem;letter-spacing:.07em;
  padding:2px 8px;border-radius:20px;
  background:rgba(184,112,58,.1);color:var(--accent);
  border:1px solid rgba(184,112,58,.2);
}
.tag-green{
  background:rgba(74,122,106,.1);color:var(--green-blue);
  border:1px solid rgba(74,122,106,.2);
}

.deco-line{width:40px;height:2px;background:var(--accent);margin:.6em 0;border-radius:1px}
.deco-line-short{width:24px;height:2px;background:var(--gold);margin:.5em 0;border-radius:1px}

.info-card{
  background:rgba(107,66,38,.05);
  border-left:3px solid var(--accent);
  padding:8px 12px;margin:.5em 0;
  border-radius:0 3px 3px 0;
}
.info-card p{margin-bottom:0;font-size:.88rem}
.info-card-green{
  background:rgba(74,122,106,.05);
  border-left:3px solid var(--green-blue);
  padding:8px 12px;margin:.5em 0;
  border-radius:0 3px 3px 0;
}
.info-card-green p{margin-bottom:0;font-size:.88rem}

.variety-box{
  background:rgba(201,168,76,.06);
  border:1px solid rgba(201,168,76,.2);
  padding:8px 12px;margin:.4em 0;
  border-radius:3px;
}
.variety-box h3{margin-top:0;font-size:.85rem;color:var(--earth)}
.variety-box p{font-size:.82rem;margin-bottom:.2em}

.stat-row{
  display:flex;gap:12px;flex-wrap:wrap;margin:.5em 0;
}
.stat{
  background:rgba(0,0,0,.03);
  padding:6px 12px;border-radius:3px;
  flex:1;min-width:100px;text-align:center;
}
.stat .val{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:1.1rem;color:var(--earth);display:block;
}
.stat .lbl{
  font-family:'DM Mono',monospace;font-size:.55rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);
}

table.ref-table{
  width:100%;border-collapse:collapse;margin:.6em 0;
  font-size:.75rem;
}
table.ref-table th{
  font-family:'Syne',sans-serif;font-weight:600;
  text-align:left;padding:5px 6px;
  border-bottom:2px solid var(--accent);
  color:var(--earth);font-size:.7rem;
  letter-spacing:.03em;
}
table.ref-table td{
  padding:4px 6px;border-bottom:1px solid rgba(180,168,148,.25);
  color:var(--ink-muted);vertical-align:top;
  font-size:.72rem;line-height:1.35;
}
table.ref-table tr:last-child td{border-bottom:none}

/* cover art */
.cover-art{
  width:100%;max-width:220px;aspect-ratio:1;
  margin:1em auto;position:relative;
}
.cover-art .bean{
  position:absolute;
  width:36%;height:50%;
  background:var(--earth);
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  box-shadow:inset -3px -2px 8px rgba(0,0,0,.3),2px 3px 8px rgba(0,0,0,.15);
}
.cover-art .bean::after{
  content:'';position:absolute;
  top:15%;left:48%;width:2px;height:55%;
  background:rgba(255,255,255,.12);border-radius:2px;transform:rotate(4deg);
}
.cover-art .bean:nth-child(1){top:10%;left:8%;transform:rotate(-25deg);opacity:.7}
.cover-art .bean:nth-child(2){top:5%;left:35%;transform:rotate(12deg);opacity:.85;width:40%;height:55%}
.cover-art .bean:nth-child(3){top:22%;right:5%;left:auto;transform:rotate(-40deg);opacity:.65;width:32%;height:46%}
.cover-art .bean:nth-child(4){bottom:8%;left:15%;transform:rotate(30deg);opacity:.55;width:30%;height:44%}
.cover-art .bean:nth-child(5){bottom:3%;left:48%;transform:rotate(-10deg);opacity:.75;width:38%;height:52%}
.cover-art .leaf{
  position:absolute;
  width:28%;height:38%;
  background:var(--green-blue);
  border-radius:0 80% 0 80%;
  opacity:.35;top:0;right:15%;transform:rotate(20deg);
}
.cover-art .leaf:nth-child(7){
  top:auto;bottom:18%;left:0;right:auto;
  transform:rotate(-35deg);opacity:.25;width:22%;height:30%;
}

/* nav */
.nav-bar{
  display:flex;align-items:center;gap:14px;
  margin-top:16px;z-index:10;
}
.nav-btn{
  font-family:'DM Mono',monospace;
  font-size:.7rem;letter-spacing:.1em;
  text-transform:uppercase;background:transparent;
  color:var(--paper-edge);
  border:1px solid rgba(212,203,184,.3);
  padding:7px 18px;border-radius:3px;cursor:pointer;
  transition:all .25s ease;
}
.nav-btn:hover{
  background:rgba(212,203,184,.1);
  border-color:rgba(212,203,184,.5);color:var(--paper);
}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn:disabled:hover{background:transparent;border-color:rgba(212,203,184,.3);color:var(--paper-edge)}
.page-indicator{
  font-family:'DM Mono',monospace;
  font-size:.65rem;color:var(--paper-edge);letter-spacing:.1em;
}

/* chapter marker */
.chapter-mark{
  display:flex;align-items:center;gap:8px;margin-bottom:.6em;
}
.chapter-mark .ch-line{flex:1;height:1px;background:var(--paper-edge);opacity:.5}
.chapter-mark .ch-num{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:2rem;color:rgba(180,112,58,.12);line-height:1;
}

.bg-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
}
.bg-particle:nth-child(1){
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(184,112,58,.04),transparent 70%);
  top:10%;left:5%;animation:drift 20s ease-in-out infinite;
}
.bg-particle:nth-child(2){
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(74,122,106,.03),transparent 70%);
  bottom:5%;right:10%;animation:drift 25s ease-in-out infinite reverse;
}
@keyframes drift{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(30px,-20px)}
}

@media(max-width:680px){
  .scene{width:96vw;height:78vh}
  .page .face,.page-left{padding:16px 18px}
  .cover-art{max-width:150px}
  h1.cover-title{font-size:1.5rem}
  h2{font-size:.95rem}
  h3{font-size:.82rem}
  p,.desc{font-size:.82rem}
  .stat-row{gap:6px}
  .stat{min-width:70px;padding:4px 8px}
  .stat .val{font-size:.9rem}
  table.ref-table{font-size:.65rem}
  table.ref-table td,table.ref-table th{padding:3px 4px}
}
</style>
</head>
<body>

<div class="bg-particle"></div>
<div class="bg-particle"></div>

<div class="scene">
  <div class="page-left" id="leftPage"></div>
  <div class="spine"></div>
  <div class="book" id="book"></div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="goPrev()">← Prev</button>
  <span class="page-indicator" id="pageIndicator">1 / 12</span>
  <button class="nav-btn" id="nextBtn" onclick="goNext()">Next →</button>
</div>

<script>
const pages = [
// ─── 0: COVER ───
{
leftHTML:`
  <div style="display:flex;flex-direction:column;justify-content:center;height:100%;text-align:center;">

`,
leftNum:'',
rightHTML:`

    <h1 class="cover-title">Indonesia's Coffee Varieties</h1>
    <div class="deco-line"></div>
    <p class="desc">From the volcanic slopes of Sumatra to the sun-drenched highlands of Bali, Indonesia's coffee story is one of terroir, tradition, and transformation. The archipelago ranks among the world's top coffee producers — and its beans are unlike any others on Earth.</p>
    <p class="desc" style="margin-top:.8em;font-style:italic;color:var(--accent);">

    </p>

// ─── 1: GILING BASAH PROCESS ───
{
leftHTML:`
  <div class="chapter-mark"><span class="ch-num">01</span><span class="ch-line"></span></div>
  <div class="region-label">Processing Method</div>
  <h2>The Giling Basah Process</h2>
  <div class="deco-line"></div>
  <p><em>Giling Basah</em> — literally "wet grinding" — is the defining processing method of the archipelago's coffee. Also known as <strong>wet hulling</strong>, it is a pragmatic adaptation to Indonesia's humid, rainy climate, where weeks of sun-drying are impractical.</p>

  <h3>How It Works</h3>
  <p>Ripe coffee cherries are harvested and depulped. The mucilage-coated beans are stored up to 24 hours while natural fermentation breaks down the sticky residue. After washing, the parchment-protected beans are partially dried — but instead of drying to the standard 11–12% moisture, farmers hull the beans when they still carry <strong>30–35% moisture</strong>.</p>

  <p>The still-soft, semi-wet green beans are then mechanically hulled and further dried to exportable 12% moisture.</p>
`,
leftNum:'1',
rightHTML:`
  <div class="info-card">
    <p><strong>Why it matters:</strong> This unconventional timing gives Indonesian coffees their signature characteristics — a distinctive <strong>bluish-green appearance</strong>, reduced acidity, and increased body.</p>
  </div>

  <h3>Cup Profile Impact</h3>
  <p>Wet-hulling produces the classic Indonesian cup: deep, earthy, and full-bodied with a dense, syrupy texture. Additional flavors include vegetal and herbal notes, woodiness, and a pleasant earthiness that sets these coffees apart.</p>

  <div class="tags">
    <span class="tag">Earthy</span>
    <span class="tag">Full Body</span>
    <span class="tag">Low Acidity</span>
    <span class="tag">Syrupy</span>
    <span class="tag">Herbal</span>
    <span class="tag">Woody</span>
  </div>

  <h3>The Goat's Foot</h3>
  <p>One quirk of wet-hulling machines: they can create a <strong>"goat's foot"</strong> (<em>kuku kambing</em>) defect — a split resembling a cloven hoof on softer beans. It's a cosmetic issue but a telltale sign of traditional Indonesian processing.</p>

  <h3>Who Uses It?</h3>
  <p>Wet-hulling dominates in <strong>Sumatra, Sulawesi, Flores, and Papua</strong>. Bali and Java sometimes use washed or natural methods instead, producing distinctly different cups from the same varieties.</p>
`,
rightNum:'2'
},

// ─── 2: SUMATRA – GAYO & LINTONG ───
{
leftHTML:`
  <div class="chapter-mark"><span class="ch-num">02</span><span class="ch-line"></span></div>
  <div class="region-label">Sumatra</div>
  <h2>Sumatra: Earthy & Full-Bodied</h2>
  <div class="deco-line"></div>
  <p>Sumatra is Indonesia's largest coffee-producing island, accounting for roughly <strong>70–75%</strong> of the country's total production. While Robusta dominates in volume, Arabica from Sumatra commands a strong position in specialty coffee worldwide.</p>

  <div class="stat-row">
    <div class="stat"><span class="val">70–75%</span><span class="lbl">National share</span></div>
    <div class="stat"><span class="val">1,100–1,700m</span><span class="lbl">Altitude range</span></div>
    <div class="stat"><span class="val">PGI</span><span class="lbl">EU-protected (Gayo)</span></div>
  </div>

  <h3>Aceh — Gayo Highlands</h3>
  <p>Located at the northern tip of Sumatra, centered around <strong>Lake Tawar</strong> at 1,100–1,700 meters. Average temperatures of 16–20°C with annual rainfall of 2,000–3,000 mm. Frequent cloud cover provides natural shade. In 2017, Gayo Arabica received <strong>Protected Geographical Indication (PGI)</strong> status in the EU as "Kopi Arabika Gayo."</p>
`,
leftNum:'3',
rightHTML:`
  <h3>Lintong — Lake Toba Area</h3>
  <p>Lies southwest of Lake Toba at <strong>1,200–1,600 meters</strong>, with average temperatures of 18–22°C and humidity often exceeding 80%. Areas closer to the lake tend to be warmer and more humid; inland areas are drier, contributing to nuanced cup variations.</p>

  <h3>Sumatran Varieties</h3>
  <div class="variety-box">
    <h3>Typica</h3>
    <p>One of the oldest Arabica varieties, originally introduced by the Dutch. Once widely planted but largely replaced after the <strong>coffee leaf rust outbreak of 1877</strong>. Typica typically offers <strong>floral and fruity aromatics</strong> with a clean, refined sweetness.</p>
  </div>
  <div class="variety-box">
    <h3>Other Cultivars</h3>
    <p>Modern replanting efforts across North Sumatra and highland areas include disease-resistant hybrids alongside heritage Typica. Only about <strong>20% of Indonesia's total production</strong> remains Arabica, making these highland Arabica lots increasingly precious.</p>
  </div>

  <div class="deco-line-short"></div>
  <div class="tags">
    <span class="tag">Chocolate</span>
    <span class="tag">Spice</span>
    <span class="tag">Earth</span>
    <span class="tag">Herbal</span>
    <span class="tag">Tobacco</span>
    <span class="tag">Syrupy Body</span>
  </div>
`,
rightNum:'4'
},

// ─── 3: SUMATRA – MANDAILING & BREWING ───
{
leftHTML:`
  <h3>Mandailing — North Sumatra</h3>
  <div class="deco-line"></div>
  <p>Mandailing lies in the broader North Sumatra highlands. The specific cultivars here align with the island's Typica heritage and newer hybrid plantings, grown by smallholder farmers who have passed their knowledge through generations.</p>

  <div class="info-card">
    <p><strong>Mandailing</strong> is among the most celebrated Sumatran names in international specialty coffee, prized for its deep herbal complexity and heavy mouthfeel.</p>
  </div>

  <div class="variety-box">
    <h3>Cup Profile — Mandailing</h3>

`,
leftNum:'5',
rightHTML:`
  <h3>Best Brewing Methods</h3>
  <div class="deco-line"></div>
  <p>Sumatran coffees are favorites for <strong>dark roasts and espresso blends</strong>. Their heavy body and low acidity also shine in:</p>

  <div class="info-card-green">
    <p><strong>French Press</strong> — Maximizes the syrupy body and earthy richness. A 4-minute steep with coarse grounds is ideal.</p>
  </div>
  <div class="info-card-green">
    <p><strong>Drip / Pour-Over</strong> — Brings out the herbal and spice complexity. Use a medium grind and slightly longer brew time.</p>
  </div>
  <div class="info-card-green">

// ─── 4: JAVA – HISTORY ───
{
leftHTML:`
  <div class="chapter-mark"><span class="ch-num">03</span><span class="ch-line"></span></div>
  <div class="region-label">Java</div>
  <h2>Java: Balanced & Classic</h2>
  <div class="deco-line"></div>
  <p>Java's coffee legacy stretches back to the <strong>late 1600s</strong>, when Dutch traders first planted arabica seedlings on the island's fertile volcanic soils. Java became so synonymous with coffee that the word "java" entered global vocabulary as a synonym for the drink itself.</p>

  <h3>A Colonial Beginning</h3>
  <p>In 1696, the Dutch governor in Malabar sent arabica seedlings from Yemen to Batavia. The first attempt failed due to flooding, but the second shipment in 1699 took root. By <strong>1704</strong>, the first green coffee was exported to Europe from Java. By 1711, the first exports — 2,000 pounds — reached Europe via the Dutch East India Company.</p>

  <p>At its peak, a kilogram of Java coffee in Amsterdam cost nearly <strong>1% of the average Dutch annual income</strong>.</p>

  <div class="info-card">
    <p><strong>The French Connection:</strong> A Java plant was gifted to <strong>King Louis XIV</strong> in 1714. Through a dramatic smuggling voyage by sailor <strong>Mathieu Gabriel de Clieu</strong> in 1723, it eventually reached Martinique — becoming the ancestor of much of the world's coffee.</p>
  </div>
`,
leftNum:'7',
rightHTML:`

// ── State ──
let currentPage = 0;
const totalPages = pages.length;
const book = document.getElementById('book');
const leftPage = document.getElementById('leftPage');
const pageIndicator = document.getElementById('pageIndicator');

function buildBook() {
  book.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = totalPages - i;
    page.dataset.index = i;

    const front = document.createElement('div');
    front.className = 'face front';
    front.innerHTML = pages[i].rightHTML +
      `<span class="page-num right">${pages[i].rightNum}</span>`;

    const back = document.createElement('div');
    back.className = 'face back';
    if (i + 1 < totalPages) {
      back.innerHTML = pages[i + 1].leftHTML +
        `<span class="page-num left">${pages[i + 1].leftNum}</span>`;
    }

    page.appendChild(front);
    page.appendChild(back);
    page.addEventListener('click', (e) => {
      const rect = page.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      if (e.clientX > midX) {
        flipPage(i);
      } else {
        if (i > 0 && book.children[i - 1].classList.contains('flipped')) {
          flipPage(i - 1);
        }
      }
    });
    book.appendChild(page);
  }
  renderLeft();
  updateZ();
  updateNav();
}

function renderLeft() {
  leftPage.innerHTML = pages[currentPage].leftHTML +
    `<span class="page-num left" style="position:absolute;bottom:14px;left:28px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ink-muted)">${pages[currentPage].leftNum}</span>`;
}

function updateZ() {
  const pageEls = book.querySelectorAll('.page');
  pageEls.forEach((p, i) => {
    p.style.zIndex = p.classList.contains('flipped') ? i + 1 : totalPages - i;
  });
}

function flipPage(index) {
  const pageEl = book.children[index];
  if (!pageEl.classList.contains('flipped')) {
    pageEl.classList.add('flipped');
    currentPage = index + 1;
  } else {
    pageEl.classList.remove('flipped');
    currentPage = index;
  }
  renderLeft();
  updateZ();
  updateNav();
}

function goNext() {
  if (currentPage < totalPages - 1) flipPage(currentPage);
}

function goPrev() {
  for (let i = totalPages - 1; i >= 0; i--) {
    if (book.children[i].classList.contains('flipped')) {
      flipPage(i);
      return;
    }
  }
}

function updateNav() {
  pageIndicator.textContent = `${currentPage + 1} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
});

buildBook();
</script>
</body>
</html>
