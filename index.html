<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Predictor — Jakarta Time</title>
<style>
:root{
  --bg:#0b0f19;--card:#111827;--card2:#1a2236;--accent:#00d4aa;--accent2:#ff6b35;
  --text:#e5e7eb;--muted:#9ca3af;--border:#1f2937;--live:#ef4444;--done:#10b981;--upcoming:#3b82f6;
  --input:#0f172a;--input-border:#334155;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px 16px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
header h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);font-size:0.8rem;margin-top:4px}
.clock-bar{background:var(--card2);padding:8px 16px;text-align:center;font-size:0.85rem;color:var(--accent);border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{background:var(--card2);color:var(--text)}
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.container{max-width:1100px;margin:0 auto;padding:14px}
.section{display:none}
.section.active{display:block}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:transform .15s,border-color .15s}
.match-card:hover{border-color:#334155;transform:translateY(-1px)}
.match-card.done{border-left:3px solid var(--done)}
.match-card.upcoming{border-left:3px solid var(--upcoming)}
.match-time{min-width:72px;text-align:center}
.match-time .day{font-size:0.65rem;color:var(--muted);text-transform:uppercase}
.match-time .time{font-size:1rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.match-time .wib{font-size:0.6rem;color:var(--accent)}
.match-teams{flex:1;min-width:0}
.team-row{display:flex;align-items:center;justify-content:space-between;padding:2px 0;gap:8px}
.team-name{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-input{width:40px;height:32px;background:var(--input);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-size:1rem;font-weight:700;text-align:center;outline:none;transition:border-color .2s}
.score-input:focus{border-color:var(--accent)}
.score-display{font-size:1.1rem;font-weight:800;min-width:28px;text-align:center;font-variant-numeric:tabular-nums}
.vs-divider{text-align:center;font-size:0.6rem;color:var(--muted);padding:1px 0;letter-spacing:2px}
.match-meta{min-width:100px;text-align:right;font-size:0.65rem;color:var(--muted)}
.match-meta .group-tag{display:inline-block;background:var(--card2);padding:2px 6px;border-radius:4px;font-size:0.6rem;font-weight:700;color:var(--accent);margin-bottom:3px}
.match-meta .venue{font-size:0.6rem}
.status-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.55rem;font-weight:700;text-transform:uppercase;margin-top:3px}
.status-done{background:rgba(16,185,129,0.15);color:var(--done)}
.status-upcoming{background:rgba(59,130,246,0.15);color:var(--upcoming)}

.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.group-header{background:var(--card2);padding:10px 12px;font-weight:700;font-size:0.85rem;display:flex;justify-content:space-between;align-items:center}
.group-header span{color:var(--accent);font-size:0.7rem}
.standings-table{width:100%;border-collapse:collapse;font-size:0.75rem}
.standings-table th{background:var(--bg);color:var(--muted);padding:5px 3px;font-weight:600;font-size:0.65rem;text-align:center}
.standings-table td{padding:6px 3px;border-top:1px solid var(--border);text-align:center}
.standings-table td:first-child{text-align:left;padding-left:10px;font-weight:600;font-size:0.8rem}
.standings-table tr:nth-child(1) td:first-child{border-left:3px solid var(--done)}
.standings-table tr:nth-child(2) td:first-child{border-left:3px solid var(--done)}
.standings-table tr:nth-child(3) td:first-child{border-left:3px solid var(--upcoming)}
.standings-table tr:nth-child(4) td:first-child{border-left:3px solid transparent}
.standings-table .pts{font-weight:800;color:var(--accent)}

.knockout-bracket{display:flex;flex-direction:column;gap:8px}
.knockout-round{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.knockout-round h3{font-size:0.8rem;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.knockout-match{display:flex;align-items:center;gap:10px;padding:8px;background:var(--card2);border-radius:8px;margin-bottom:6px;font-size:0.8rem}
.knockout-match:last-child{margin-bottom:0}
.knockout-match .k-time{min-width:60px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;font-size:0.75rem}
.knockout-match .k-teams{flex:1;font-weight:600;min-width:0}
.knockout-match .k-teams .k-team{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.knockout-match .k-venue{color:var(--muted);font-size:0.6rem;min-width:120px;text-align:right}

.btn{display:inline-block;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;font-weight:700}
.btn-primary:hover{opacity:0.9}
.actions-bar{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.save-status{text-align:center;font-size:0.75rem;color:var(--accent);min-height:20px;margin-top:4px}

@media(max-width:600px){
  header h1{font-size:1.1rem}
  .match-card{flex-wrap:wrap}
  .match-meta{width:100%;text-align:left;margin-top:4px}
  .group-grid{grid-template-columns:1fr}
  .knockout-match{flex-wrap:wrap}
  .knockout-match .k-venue{width:100%;text-align:left;margin-top:4px}
}
</style>

 vs 2G", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-03", "et": "18:00", "venue": "Hard Rock Stadium, Miami Gardens", "slot": "1J vs 2H", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-03", "et": "21:30", "venue": "Arrowhead Stadium, Kansas City", "slot": "1K vs 3rd", "t1": null, "t2": null, "s1": null, "s2": null}], "r16": [{"date": "2026-07-04", "et": "13:00", "venue": "NRG Stadium, Houston", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-04", "et": "17:00", "venue": "Lincoln Financial Field, Philadelphia", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-05", "et": "16:00", "venue": "MetLife Stadium, East Rutherford", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-05", "et": "20:00", "venue": "Estadio Azteca, Mexico City", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-06", "et": "15:00", "venue": "AT&T Stadium, Arlington", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-06", "et": "20:00", "venue": "Lumen Field, Seattle", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-07", "et": "12:00", "venue": "Mercedes-Benz Stadium, Atlanta", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-07", "et": "16:00", "venue": "BC Place, Vancouver", "t1": null, "t2": null, "s1": null, "s2": null}], "qf": [{"date": "2026-07-09", "et": "16:00", "venue": "Gillette Stadium, Foxborough", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-10", "et": "15:00", "venue": "SoFi Stadium, Inglewood", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-11", "et": "17:00", "venue": "Hard Rock Stadium, Miami Gardens", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-11", "et": "21:00", "venue": "Arrowhead Stadium, Kansas City", "t1": null, "t2": null, "s1": null, "s2": null}], "sf": [{"date": "2026-07-14", "et": "15:00", "venue": "AT&T Stadium, Arlington", "t1": null, "t2": null, "s1": null, "s2": null}, {"date": "2026-07-15", "et": "15:00", "venue": "Mercedes-Benz Stadium, Atlanta", "t1": null, "t2": null, "s1": null, "s2": null}], "3rd": [{"date": "2026-07-18", "et": "17:00", "venue": "Hard Rock Stadium, Miami Gardens", "t1": null, "t2": null, "s1": null, "s2": null}], "final": [{"date": "2026-07-19", "et": "15:00", "venue": "MetLife Stadium, East Rutherford", "t1": null, "t2": null, "s1": null, "s2": null}]};

let userScores = {};
let knockoutTeams = {};

function etToWIB(etTime){
  const[h,m]=etTime.split(':').map(Number);
  let w=h+11;if(w>=24)w-=24;
  return String(w).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function getDayName(dateStr){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[new Date(dateStr+'T00:00:00').getDay()];
}
function getGroupOf(team){
  for(const[g,teams]of Object.entries(groups))if(teams.includes(team))return g;
  return '';
}
function formatDate(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function matchKey(date,t1,t2){return date+'|'+t1+'|'+t2;}

function buildStandings(){
  const st={};
  for(const[g,teams]of Object.entries(groups)){
    st[g]={};
    for(const t of teams)st[g][t]={P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0};
  }
  // MD1 (locked results)
  for(const m of matchday1Results){
    const g=getGroupOf(m.t1);if(!g)continue;
    st[g][m.t1].P++;st[g][m.t2].P++;
    st[g][m.t1].GF+=m.s1;st[g][m.t1].GA+=m.s2;
    st[g][m.t2].GF+=m.s2;st[g][m.t2].GA+=m.s1;
    st[g][m.t1].GD=st[g][m.t1].GF-st[g][m.t1].GA;
    st[g][m.t2].GD=st[g][m.t2].GF-st[g][m.t2].GA;
    if(m.s1>m.s2){st[g][m.t1].W++;st[g][m.t1].Pts+=3;st[g][m.t2].L++;}
    else if(m.s1<m.s2){st[g][m.t2].W++;st[g][m.t2].Pts+=3;st[g][m.t1].L++;}
    else{st[g][m.t1].D++;st[g][m.t1].Pts++;st[g][m.t2].D++;st[g][m.t2].Pts++;}
  }
  // User-entered scores (MD2 & MD3)
  for(const[key,sc]of Object.entries(userScores)){
    if(sc.s1===''||sc.s2==='')continue;
    const s1=parseInt(sc.s1),s2=parseInt(sc.s2);
    const allFixtures=[...matchday2Fixtures,...matchday3Fixtures];
    const m=allFixtures.find(x=>matchKey(x.date,x.t1,x.t2)===key);
    if(!m)continue;
    const g=getGroupOf(m.t1);if(!g)continue;
    st[g][m.t1].P++;st[g][m.t2].P++;
    st[g][m.t1].GF+=s1;st[g][m.t1].GA+=s2;
    st[g][m.t2].GF+=s2;st[g][m.t2].GA+=s1;
    st[g][m.t1].GD=st[g][m.t1].GF-st[g][m.t1].GA;
    st[g][m.t2].GD=st[g][m.t2].GF-st[g][m.t2].GA;
    if(s1>s2){st[g][m.t1].W++;st[g][m.t1].Pts+=3;st[g][m.t2].L++;}
    else if(s1<s2){st[g][m.t2].W++;st[g][m.t2].Pts+=3;st[g][m.t1].L++;}
    else{st[g][m.t1].D++;st[g][m.t1].Pts++;st[g][m.t2].D++;st[g][m.t2].Pts++;}
  }
  for(const g in st)st[g]=Object.fromEntries(Object.entries(st[g]).sort((a,b)=>{
    if(b[1].Pts!==a[1].Pts)return b[1].Pts-a[1].Pts;
    if(b[1].GD!==a[1].GD)return b[1].GD-a[1].GD;
    return b[1].GF-a[1].GF;
  }));
  return st;
}

function getThirdPlaceTeams(standings){
  const thirds=[];
  for(const[g,teams]of Object.entries(standings)){
    const entries=Object.entries(teams);
    if(entries.length>=3){const[name,stats]=entries[2];thirds.push({group:g,team:name,...stats});}
  }
  return thirds.sort((a,b)=>{
    if(b.Pts!==a.Pts)return b.Pts-a.Pts;
    if(b.GD!==a.GD)return b.GD-a.GD;
    return b.GF-a.GF;
  });
}

function fillKnockoutTeams(){
  const st=buildStandings();
  const thirds=getThirdPlaceTeams(st);
  const best3=thirds.slice(0,8);
  const get=(g,pos)=>{const e=Object.entries(st[g]);return e[pos]?e[pos][0]:'TBD';};
  knockoutTeams={
    '1A':get('A',0),'2A':get('A',1),'3A':get('A',2),
    '1B':get('B',0),'2B':get('B',1),'3B':get('B',2),
    '1C':get('C',0),'2C':get('C',1),'3C':get('C',2),
    '1D':get('D',0),'2D':get('D',1),'3D':get('D',2),
    '1E':get('E',0),'2E':get('E',1),'3E':get('E',2),
    '1F':get('F',0),'2F':get('F',1),'3F':get('F',2),
    '1G':get('G',0),'2G':get('G',1),'3G':get('G',2),
    '1H':get('H',0),'2H':get('H',1),'3H':get('H',2),
    '1I':get('I',0),'2I':get('I',1),'3I':get('I',2),
    '1J':get('J',0),'2J':get('J',1),'3J':get('J',2),
    '1K':get('K',0),'2K':get('K',1),'3K':get('K',2),
    '1L':get('L',0),'2L':get('L',1),'3L':get('L',2),
    '3rd1':best3[0]?.team||'TBD','3rd2':best3[1]?.team||'TBD',
    '3rd3':best3[2]?.team||'TBD','3rd4':best3[3]?.team||'TBD',
    '3rd5':best3[4]?.team||'TBD','3rd6':best3[5]?.team||'TBD',
    '3rd7':best3[6]?.team||'TBD','3rd8':best3[7]?.team||'TBD',
  };
}

function renderSchedule(){
  const list=document.getElementById('scheduleList');list.innerHTML='';
  const allMatches=[];
  for(const m of matchday1Results)allMatches.push({...m,status:'done',matchday:1,locked:true});
  for(const m of matchday2Fixtures){
    const key=matchKey(m.date,m.t1,m.t2);
    const sc=userScores[key]||{s1:'',s2:''};
    const hasScore=sc.s1!==''&&sc.s2!=='';
    allMatches.push({...m,status:hasScore?'done':'upcoming',matchday:2,locked:false,s1:hasScore?parseInt(sc.s1):undefined,s2:hasScore?parseInt(sc.s2):undefined,key});
  }
  for(const m of matchday3Fixtures){
    const key=matchKey(m.date,m.t1,m.t2);
    const sc=userScores[key]||{s1:'',s2:''};
    const hasScore=sc.s1!==''&&sc.s2!=='';
    allMatches.push({...m,status:hasScore?'done':'upcoming',matchday:3,locked:false,s1:hasScore?parseInt(sc.s1):undefined,s2:hasScore?parseInt(sc.s2):undefined,key});
  }
  allMatches.sort((a,b)=>{const da=a.date+'T'+a.et,db=b.date+'T'+b.et;return da.localeCompare(db);});
  let lastDate='';
  for(const m of allMatches){
    if(m.date!==lastDate){
      const h2=document.createElement('h2');
      h2.style.cssText='font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-left:4px;';
      h2.textContent=getDayName(m.date)+', '+formatDate(m.date)+' 2026';
      list.appendChild(h2);lastDate=m.date;
    }
    const card=document.createElement('div');card.className='match-card '+m.status;
    const wib=etToWIB(m.et);
    const group='Group '+getGroupOf(m.t1);
    let teamsHtml='';
    if(m.locked){
      teamsHtml=`<div class="team-row"><span class="team-name">${m.t1}</span><span class="score-display">${m.s1}</span></div><div class="vs-divider">VS</div><div class="team-row"><span class="team-name">${m.t2}</span><span class="score-display">${m.s2}</span></div>`;
    }else{
      const sc=userScores[m.key]||{s1:'',s2:''};
      teamsHtml=`<div class="team-row"><span class="team-name">${m.t1}</span><input type="number" min="0" class="score-input" data-key="${m.key}" data-side="1" value="${sc.s1}" placeholder="-"></div><div class="vs-divider">VS</div><div class="team-row"><span class="team-name">${m.t2}</span><input type="number" min="0" class="score-input" data-key="${m.key}" data-side="2" value="${sc.s2}" placeholder="-"></div>`;
    }
    const statusText=m.status==='done'?'FT':'UPCOMING';
    card.innerHTML=`<div class="match-time"><div class="day">${getDayName(m.date)}</div><div class="time">${wib}</div><div class="wib">WIB</div></div><div class="match-teams">${teamsHtml}</div><div class="match-meta"><div class="group-tag">${group}</div><div class="venue">${m.venue}</div><div class="status-badge status-${m.status}">${statusText}</div></div>`;
    list.appendChild(card);
  }
  document.querySelectorAll('.score-input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const key=e.target.dataset.key;
      const side=e.target.dataset.side;
      const val=e.target.value;
      if(!userScores[key])userScores[key]={s1:'',s2:''};
      if(side==='1')userScores[key].s1=val;else userScores[key].s2=val;
      renderSchedule();renderStandings();renderKnockout();
      document.getElementById('saveStatus').textContent='';
    });
  });
}

function renderStandings(){
  const st=buildStandings();
  const grid=document.getElementById('standingsGrid');grid.innerHTML='';
  for(const[g,teams]of Object.entries(st)){
    const card=document.createElement('div');card.className='group-card';
    let rows='';let rank=1;
    for(const[name,s]of Object.entries(teams)){
      rows+=`<tr><td>${rank}. ${name}</td><td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td><td>${s.GF}</td><td>${s.GA}</td><td>${s.GD}</td><td class="pts">${s.Pts}</td></tr>`;rank++;
    }
    card.innerHTML=`<div class="group-header">Group ${g} <span>Top 2 + Best 3rd</span></div><table class="standings-table"><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
    grid.appendChild(card);
  }
}

function renderGroups(){
  const grid=document.getElementById('groupsGrid');grid.innerHTML='';
  for(const[g,teams]of Object.entries(groups)){
    const card=document.createElement('div');card.className='group-card';
    let list='';
    for(const t of teams)list+=`<div style="padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;"><span style="font-size:1.1rem;">🏳️</span><span style="font-weight:600;font-size:0.85rem;">${t}</span></div>`;
    card.innerHTML=`<div class="group-header">Group ${g}</div>${list}`;
    grid.appendChild(card);
  }
}

function renderKnockout(){
  fillKnockoutTeams();
  const bracket=document.getElementById('knockoutBracket');bracket.innerHTML='';
  const koData={};
  for(const[stage,matches]of Object.entries(knockoutStructure)){
    koData[stage]=matches.map(m=>({...m}));
  }
  const r32Slots=[
    {t1:'2A',t2:'2B'},{t1:'1C',t2:'2F'},{t1:'1E',t2:'3rd1'},{t1:'1F',t2:'2C'},
    {t1:'2E',t2:'2I'},{t1:'1I',t2:'3rd2'},{t1:'1A',t2:'3rd3'},{t1:'1L',t2:'3rd4'},
    {t1:'1G',t2:'3rd5'},{t1:'1D',t2:'3rd6'},{t1:'1H',t2:'2J'},{t1:'2K',t2:'2L'},
    {t1:'1B',t2:'3rd7'},{t1:'2D',t2:'2G'},{t1:'1J',t2:'2H'},{t1:'1K',t2:'3rd8'},
  ];
  for(let i=0;i<16;i++){
    const def=r32Slots[i];
    koData.r32[i].t1=knockoutTeams[def.t1]||'TBD';
    koData.r32[i].t2=knockoutTeams[def.t2]||'TBD';
  }
  const stageNames={r32:'Round of 32',r16:'Round of 16',qf:'Quarterfinals',sf:'Semifinals','3rd':'Third Place',final:'Final'};
  const stageOrder=['r32','r16','qf','sf','3rd','final'];
  for(const stage of stageOrder){
    const div=document.createElement('div');div.className='knockout-round';
    let matchesHtml='';
    for(const m of koData[stage]){
      const wib=etToWIB(m.et);
      const t1=m.t1||'TBD';const t2=m.t2||'TBD';
      const score=(m.s1!==null&&m.s2!==null&&m.s1!==undefined)?`${m.s1} - ${m.s2}`:'TBD';
      matchesHtml+=`<div class="knockout-match"><div class="k-time">${formatDate(m.date)}<br>${wib}</div><div class="k-teams"><div class="k-team">${t1}</div><div style="color:var(--muted);font-size:0.7rem;margin:2px 0;">vs</div><div class="k-team">${t2}</div></div><div class="k-venue">${m.venue}<br><span style="color:var(--accent);font-weight:700;">${score}</span></div></div>`;
    }
    div.innerHTML=`<h3>${stageNames[stage]}</h3>${matchesHtml}`;
    bracket.appendChild(div);
  }
}

function saveScores(){
  localStorage.setItem('wc2026_scores',JSON.stringify(userScores));
  document.getElementById('saveStatus').textContent='✅ Scores saved to browser!';
  setTimeout(()=>document.getElementById('saveStatus').textContent='',3000);
}
function loadScores(){
  const data=localStorage.getItem('wc2026_scores');
  if(data)userScores=JSON.parse(data);
}
function clearScores(){
  if(confirm('Clear all entered scores?')){
    userScores={};localStorage.removeItem('wc2026_scores');
    renderSchedule();renderStandings();renderKnockout();
    document.getElementById('saveStatus').textContent='🗑️ All scores cleared';
    setTimeout(()=>document.getElementById('saveStatus').textContent='',3000);
  }
}
function autoFill(){
  function rand(){
    const r=Math.random();
    if(r<0.25)return 0;if(r<0.55)return 1;if(r<0.78)return 2;if(r<0.90)return 3;if(r<0.96)return 4;return 5;
  }
  const strong=["Argentina","Brazil","France","Germany","Spain","Portugal","England","Netherlands","Belgium"];
  for(const m of matchday2Fixtures){
    const key=matchKey(m.date,m.t1,m.t2);
    if(!userScores[key]||userScores[key].s1===''){
      let s1=rand(),s2=rand();
      if(strong.includes(m.t1)&&Math.random()<0.3)s1++;
      if(strong.includes(m.t2)&&Math.random()<0.3)s2++;
      userScores[key]={s1:String(s1),s2:String(s2)};
    }
  }
  for(const m of matchday3Fixtures){
    const key=matchKey(m.date,m.t1,m.t2);
    if(!userScores[key]||userScores[key].s1===''){
      let s1=rand(),s2=rand();
      if(strong.includes(m.t1)&&Math.random()<0.3)s1++;
      if(strong.includes(m.t2)&&Math.random()<0.3)s2++;
      userScores[key]={s1:String(s1),s2:String(s2)};
    }
  }
  renderSchedule();renderStandings();renderKnockout();
  document.getElementById('saveStatus').textContent='🎲 Auto-filled remaining matches!';
  setTimeout(()=>document.getElementById('saveStatus').textContent='',3000);
}
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));
}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.classList.contains('tab-btn'))switchTab(e.target.dataset.tab);});
document.getElementById('saveBtn').addEventListener('click',saveScores);
document.getElementById('clearBtn').addEventListener('click',clearScores);
document.getElementById('autoBtn').addEventListener('click',autoFill);
function updateClock(){
  document.getElementById('jakartaClock').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' WIB';
}
setInterval(updateClock,1000);updateClock();
loadScores();
renderSchedule();renderStandings();renderGroups();renderKnockout();
</script>
