<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHEAD — Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #7B1F3F;
            --burgundy-light: #9B2D4F;
            --burgundy-dark: #5C152F;
            --cream: #FAF7F2;
            --cream-dark: #F0EBE3;
            --text: #2D1F23;
            --text-light: #6B5B60;
            --white: #FFFFFF;
            --shadow: 0 4px 24px rgba(123, 31, 63, 0.08);
            --shadow-lg: 0 12px 40px rgba(123, 31, 63, 0.15);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(250, 247, 242, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(123, 31, 63, 0.08);
            transition: all 0.3s ease;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--burgundy);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--burgundy);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            width: 240px;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1.5px solid rgba(123, 31, 63, 0.15);
            border-radius: 100px;
            background: var(--white);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--burgundy);
            box-shadow: 0 0 0 3px rgba(123, 31, 63, 0.1);
            width: 280px;
        }

        .search-box svg {
            position: absolute;
            left: 0.9rem;
            width: 18px;
            height: 18px;
            color: var(--text-light);
            pointer-events: none;
        }

        .cart-btn {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--burgundy);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: var(--burgundy-light);
        }

        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #E85D4E;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--cream);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cart-count.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Hero */
        .hero {
            margin-top: 80px;
            padding: 3rem 2rem 2rem;
            text-align: center;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(123, 31, 63, 0.08);
            color: var(--burgundy);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--burgundy);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .hero p {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Main Toggle */
        .main-toggle {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 2rem auto;
            max-width: 400px;
            padding: 0.4rem;
            background: var(--cream-dark);
            border-radius: 100px;
            width: fit-content;
        }

        .main-toggle button {
            padding: 0.75rem 2rem;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .main-toggle button.active {
            background: var(--burgundy);
            color: white;
            box-shadow: var(--shadow);
        }

        .main-toggle button:not(.active):hover {
            color: var(--burgundy);
        }

        /* Sub Categories */
        .sub-categories {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 0 2rem;
            max-width: 1200px;
            margin: 0 auto 2rem;
        }

        .sub-categories button {
            padding: 0.5rem 1.25rem;
            border: 1.5px solid rgba(123, 31, 63, 0.12);
            background: var(--white);
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .sub-categories button:hover {
            border-color: var(--burgundy);
            color: var(--burgundy);
            transform: translateY(-1px);
        }

        .sub-categories button.active {
            background: var(--burgundy);
            color: white;
            border-color: var(--burgundy);
            box-shadow: 0 4px 12px rgba(123, 31, 63, 0.2);
        }

        /* Menu Grid */
        .menu-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            color: var(--burgundy);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(123, 31, 63, 0.2), transparent);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .menu-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(123, 31, 63, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--burgundy), var(--burgundy-light));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .card-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--burgundy-light);
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .card-description {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 0.75rem;
            flex: 1;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .temp-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.6rem;
            background: rgba(123, 31, 63, 0.06);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--burgundy);
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(123, 31, 63, 0.06);
        }

        .card-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--burgundy);
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--burgundy);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 1.25rem;
            line-height: 1;
        }

        .add-btn:hover {
            background: var(--burgundy-light);
            transform: scale(1.1);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* Cart Drawer */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(45, 31, 35, 0.4);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .cart-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: var(--white);
            z-index: 201;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
        }

        .cart-drawer.open {
            transform: translateX(0);
        }

        .cart-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(123, 31, 63, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--burgundy);
        }

        .close-cart {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--cream);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-cart:hover {
            background: var(--cream-dark);
            transform: rotate(90deg);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        .cart-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .cart-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(123, 31, 63, 0.06);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .cart-item-category {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid rgba(123, 31, 63, 0.15);
            background: white;
            color: var(--burgundy);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: var(--burgundy);
            color: white;
            border-color: var(--burgundy);
        }

        .cart-item-price {
            font-weight: 700;
            color: var(--burgundy);
            font-size: 0.95rem;
        }

        .remove-item {
            color: #E85D4E;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
            padding: 0;
            margin-top: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .remove-item:hover {
            opacity: 1;
        }

        .cart-footer {
            padding: 1.5rem 2rem 2rem;
            border-top: 1px solid rgba(123, 31, 63, 0.08);
            background: var(--cream);
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .cart-total-label {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .cart-total-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--burgundy);
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--burgundy);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .checkout-btn:hover {
            background: var(--burgundy-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            background: var(--burgundy-dark);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-lg);
            animation: toastUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            pointer-events: auto;
            min-width: 280px;
        }

        @keyframes toastUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .toast.hide {
            animation: toastDown 0.3s ease forwards;
        }

        @keyframes toastDown {
            to { opacity: 0; transform: translateY(10px) scale(0.95); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(45, 31, 35, 0.5);
            backdrop-filter: blur(6px);
            z-index: 250;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius);
            max-width: 480px;
            width: 100%;
            padding: 2rem;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.open .modal {
            transform: scale(1) translateY(0);
        }

        .modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--burgundy);
            margin-bottom: 0.25rem;
        }

        .modal-category {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .modal-description {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid rgba(123, 31, 63, 0.08);
        }

        .modal-price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--burgundy);
            margin-bottom: 1.5rem;
        }

        .modal-options {
            margin-bottom: 1.5rem;
        }

        .option-label {
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: block;
            font-size: 0.9rem;
        }

        .option-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 0.6rem 1.2rem;
            border: 1.5px solid rgba(123, 31, 63, 0.15);
            background: white;
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .option-btn:hover {
            border-color: var(--burgundy);
        }

        .option-btn.active {
            background: var(--burgundy);
            color: white;
            border-color: var(--burgundy);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-cancel {
            background: var(--cream);
            border: none;
            color: var(--text);
        }

        .modal-cancel:hover {
            background: var(--cream-dark);
        }

        .modal-add {
            background: var(--burgundy);
            border: none;
            color: white;
        }

        .modal-add:hover {
            background: var(--burgundy-light);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 1rem;
            }

            .search-box input {
                width: 140px;
            }

            .search-box input:focus {
                width: 160px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .cart-drawer {
                max-width: 100%;
            }

            .sub-categories {
                padding: 0 1rem;
            }

            .menu-section {
                padding: 0 1rem 3rem;
            }
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card {
            animation: fadeUp 0.5s ease backwards;
        }

        .menu-card:nth-child(1) { animation-delay: 0.05s; }
        .menu-card:nth-child(2) { animation-delay: 0.1s; }
        .menu-card:nth-child(3) { animation-delay: 0.15s; }
        .menu-card:nth-child(4) { animation-delay: 0.2s; }
        .menu-card:nth-child(5) { animation-delay: 0.25s; }
        .menu-card:nth-child(6) { animation-delay: 0.3s; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(123, 31, 63, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(123, 31, 63, 0.4);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <div class="logo-icon">A</div>
                <span class="logo-text">ahead</span>
            </a>
            <div class="header-actions">
                <div class="search-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Search menu...">
                </div>
                <button class="cart-btn" onclick="toggleCart()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-badge">

                {

                    price: 30,

                    description: 'Chocolate babka with crunchy peanut brittle. Decadent, nutty, and texturally satisfying.'
                },
                { 
                    id: 'br15', 
                    category: 'Ciabatta', 
                    name: 'Fillet O Fish', 
                    price: 35, 
                    temps: [],
                    description: 'Crispy fish fillet with tartar sauce on toasted ciabatta. Crunchy, creamy, and satisfying.'
                },
                { 
                    id: 'br16', 
                    category: 'Ciabatta', 
                    name: 'Spicy Chicken Honey', 
                    price: 35, 
                    temps: [],
                    description: 'Spicy glazed chicken with honey drizzle on ciabatta. Sweet heat in every bite.'
                }
            ]
        };

        const subCategories = {
            beverages: ['All', 'Regular', 'Fine Ahead', 'Filter', 'House Matcha', 'Signature', 'Alternative', 'Fresh'],
            bread: ['All', 'Mochi Bread', 'Shiopan', 'Cinnamon Roll', 'Babka Slices', 'Ciabatta']
        };

        // State
        let currentMainTab = 'beverages';
        let currentSubCategory = 'All';
        let cart = [];
        let selectedItem = null;
        let selectedTemp = null;

        // DOM Elements
        const menuGrid = document.getElementById('menuGrid');
        const subCategoriesEl = document.getElementById('subCategories');
        const searchInput = document.getElementById('searchInput');
        const cartCount = document.getElementById('cartCount');
        const cartItems = document.getElementById('cartItems');
        const cartTotal = document.getElementById('cartTotal');
        const checkoutBtn = document.getElementById('checkoutBtn');

        // Initialize
        function init() {
            renderSubCategories();
            renderMenu();
            
            searchInput.addEventListener('input', (e) => {
                renderMenu(e.target.value);
            });
        }

        // Render Sub Categories
        function renderSubCategories() {
            const categories = subCategories[currentMainTab];
            subCategoriesEl.innerHTML = categories.map(cat => `
                <button class="${cat === currentSubCategory ? 'active' : ''}" onclick="setSubCategory('${cat}')">${cat}</button>
            `).join('');
        }

        // Set Main Tab
        function setMainTab(tab) {
            currentMainTab = tab;
            currentSubCategory = 'All';
            
            document.getElementById('tab-beverages').classList.toggle('active', tab === 'beverages');
            document.getElementById('tab-bread').classList.toggle('active', tab === 'bread');
            
            renderSubCategories();
            renderMenu(searchInput.value);
        }

        // Set Sub Category
        function setSubCategory(category) {
            currentSubCategory = category;
            renderSubCategories();
            renderMenu(searchInput.value);
        }

        // Render Menu
        function renderMenu(searchTerm = '') {
            const items = menuData[currentMainTab];
            const filtered = items.filter(item => {
                const matchesCategory = currentSubCategory === 'All' || item.category === currentSubCategory;
                const matchesSearch = !searchTerm || 
                    item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.description.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                menuGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: var(--text-light);">
                        <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom: 1rem; opacity: 0.3;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p style="font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem;">No items found</p>
                        <p>Try adjusting your search or category filter</p>
                    </div>
                `;
                return;
            }

            menuGrid.innerHTML = filtered.map((item, index) => `
                <div class="menu-card" style="animation-delay: ${index * 0.05}s" onclick="openItemModal('${item.id}')">
                    <div class="card-category">${item.category}</div>
                    <div class="card-title">${item.name}</div>
                    <div class="card-description">${item.description}</div>
                    <div class="card-meta">
                        ${item.temps.includes('H') ? '<span class="temp-badge">Hot</span>' : ''}
                        ${item.temps.includes('I') ? '<span class="temp-badge">Iced</span>' : ''}
                    </div>
                    <div class="card-footer">
                        <span class="card-price">Rp ${item.price}k</span>
                        <button class="add-btn" onclick="event.stopPropagation(); quickAdd('${item.id}')">+</button>
                    </div>
                </div>
            `).join('');
        }

        // Quick Add
        function quickAdd(itemId) {
            const allItems = [...menuData.beverages, ...menuData.bread];
            const item = allItems.find(i => i.id === itemId);
            
            if (item.temps.length > 0) {
                openItemModal(itemId);
                return;
            }
            
            addToCart(itemId);
        }

        // Open Item Modal
        function openItemModal(itemId) {
            const allItems = [...menuData.beverages, ...menuData.bread];
            selectedItem = allItems.find(i => i.id === itemId);
            selectedTemp = selectedItem.temps.length > 0 ? selectedItem.temps[0] : null;
            
            document.getElementById('modalTitle').textContent = selectedItem.name;
            document.getElementById('modalCategory').textContent = selectedItem.category;
            document.getElementById('modalDescription').textContent = selectedItem.description;
            document.getElementById('modalPrice').textContent = `Rp ${selectedItem.price}k`;
            
            const optionsEl = document.getElementById('modalOptions');
            if (selectedItem.temps.length > 0) {
                optionsEl.innerHTML = `
                    <label class="option-label">Temperature</label>
                    <div class="option-group">
                        ${selectedItem.temps.map(temp => `
                            <button class="option-btn ${selectedTemp === temp ? 'active' : ''}" onclick="selectTemp('${temp}')">${temp === 'H' ? 'Hot' : 'Iced'}</button>
                        `).join('')}
                    </div>
                `;
            } else {
                optionsEl.innerHTML = '';
            }
            
            document.getElementById('modalOverlay').classList.add('open');
        }

        function selectTemp(temp) {
            selectedTemp = temp;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.textContent === (temp === 'H' ? 'Hot' : 'Iced'));
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            selectedItem = null;
            selectedTemp = null;
        }

        function confirmAddToCart() {
            if (!selectedItem) return;
            addToCart(selectedItem.id, selectedTemp);
            closeModal();
        }

        // Add to Cart
        function addToCart(itemId, temp = null) {
            const allItems = [...menuData.beverages, ...menuData.bread];
            const item = allItems.find(i => i.id === itemId);
            const cartId = temp ? `${itemId}-${temp}` : itemId;
            
            const existing = cart.find(c => c.cartId === cartId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({
                    cartId,
                    id: itemId,
                    name: item.name,
                    category: item.category,
                    price: item.price,
                    temp: temp,
                    qty: 1
                });
            }
            
            updateCart();
            showToast(`Added ${item.name}${temp ? ` (${temp === 'H' ? 'Hot' : 'Iced'})` : ''} to cart`);
        }

        // Update Cart UI
        function updateCart() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            cartCount.textContent = totalQty;
            cartCount.classList.toggle('active', totalQty > 0);
            cartTotal.textContent = `Rp ${totalPrice}k`;
            checkoutBtn.disabled = cart.length === 0;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        <p>Your cart is empty</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem;">Add some items to get started</p>
                    </div>
                `;
                return;
            }
            
            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-category">${item.category}${item.temp ? ` • ${item.temp === 'H' ? 'Hot' : 'Iced'}` : ''}</div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="updateQty('${item.cartId}', -1)">−</button>
                            <span style="font-weight: 600; min-width: 20px; text-align: center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty('${item.cartId}', 1)">+</button>
                        </div>
                        <button class="remove-item" onclick="removeItem('${item.cartId}')">Remove</button>
                    </div>
                    <div class="cart-item-price">Rp ${item.price * item.qty}k</div>
                </div>
            `).join('');
        }

        function updateQty(cartId, delta) {
            const item = cart.find(c => c.cartId === cartId);
            if (!item) return;
            
            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(c => c.cartId !== cartId);
            }
            updateCart();
        }

        function removeItem(cartId) {
            cart = cart.filter(c => c.cartId !== cartId);
            updateCart();
        }

        // Toggle Cart
        function toggleCart() {
            document.getElementById('cartOverlay').classList.toggle('open');
            document.getElementById('cartDrawer').classList.toggle('open');
        }

        // Checkout
        function checkout() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const itemCount = cart.reduce((sum, item) => sum + item.qty, 0);
            
            showToast(`Order placed! ${itemCount} items • Rp ${total}k`, 3000);
            cart = [];
            updateCart();
            toggleCart();
        }

        // Toast
        function showToast(message, duration = 2500) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                ${message}
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // Initialize app
        init();
    </script>
