<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semarang Culinary Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  
  body {
    background: linear-gradient(135deg, #fff5e6 0%, #ffe4c4 100%);
    min-height: 100vh;
    color: #333;
  }
  
  header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  
  header h1 {
    font-size: 2.5rem;
    margin-bottom: 8px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  
  header p { font-size: 1.1rem; opacity: 0.95; }
  
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  
  .controls {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    margin-bottom: 25px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
  }
  
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 12px 20px;
    border: 2px solid #e74c3c;
    border-radius: 25px;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
  }
  
  .search-box:focus { box-shadow: 0 0 10px rgba(231, 76, 60, 0.3); }
  
  .filter-btn {
    padding: 10px 20px;
    border: 2px solid #e74c3c;
    background: white;
    color: #e74c3c;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }
  
  .filter-btn:hover, .filter-btn.active {
    background: #e74c3c;
    color: white;
    transform: translateY(-2px);
  }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
  }
  
  .card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
    position: relative;
  }
  
  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  }
  
  .card-image {
    height: 180px;
    background: linear-gradient(135deg, #f39c12, #e67e22);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
  }
  
  .card-content { padding: 18px; }
  
  .card-title {
    font-size: 1.3rem;
    color: #c0392b;
    margin-bottom: 8px;
  }
  
  .card-category {
    display: inline-block;
    background: #f1c40f;
    color: #333;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 10px;
  }
  
  .card-desc {
    color: #666;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .price { color: #27ae60; font-weight: 700; }
  
  .fav-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    transition: 0.3s;
  }
  
  .fav-btn:hover { transform: scale(1.2); }
  
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .modal.active { display: flex; }
  
  .modal-content {
    background: white;
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  
  @keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  .modal-header {
    height: 200px;
    background: linear-gradient(135deg, #f39c12, #e67e22);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7rem;
    position: relative;
  }
  
  .close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 40px;
    height: 40px;
    background: white;
    border: none;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    font-weight: bold;
  }
  
  .modal-body { padding: 25px; }
  
  .modal-body h2 { color: #c0392b; margin-bottom: 10px; }
  
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin: 20px 0;
  }
  
  .info-item {
    background: #fff5e6;
    padding: 12px;
    border-radius: 10px;
    border-left: 4px solid #e74c3c;
  }
  
  .info-label {
    font-size: 0.8rem;
    color: #888;
    text-transform: uppercase;
  }
  
  .info-value {
    font-weight: 600;
    color: #333;
    margin-top: 4px;
  }
  
  .empty {
    text-align: center;
    padding: 50px;
    color: #888;
    font-size: 1.2rem;
    grid-column: 1 / -1;
  }
  
  .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  
  .stat-box {
    background: white;
    padding: 15px 25px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
  }
  
  .stat-num {
    font-size: 1.8rem;
    font-weight: bold;
    color: #e74c3c;
  }
  
  .stat-label { font-size: 0.85rem; color: #666; }
</style>
</head>
<body>

<header>
  <h1>🍜 Semarang Culinary Explorer</h1>
  <p>Discover the Authentic Flavors of Semarang, Indonesia</p>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-box"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total Dishes</div></div>
    <div class="stat-box"><div class="stat-num" id="favCount">0</div><div class="stat-label">Favorites</div></div>
    <div class="stat-box"><div class="stat-num" id="shownCount">0</div><div class="stat-label">Showing</div></div>
  </div>
  
  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="🔍 Search culinary...">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="main">Main Dish</button>
    <button class="filter-btn" data-filter="snack">Snack</button>
    <button class="filter-btn" data-filter="dessert">Dessert</button>
    <button class="filter-btn" data-filter="drink">Drink</button>
    <button class="filter-btn" data-filter="favorites">❤️ Favorites</button>
  </div>
  
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modalEmoji"></span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <span class="card-category" id="modalCategory"></span>
      <p id="modalDesc" style="margin-top:15px; line-height:1.6;"></p>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Price Range</div><div class="info-value" id="modalPrice"></div></div>
        <div class="info-item"><div class="info-label">Origin</div><div class="info-value" id="modalOrigin"></div></div>
        <div class="info-item"><div class="info-label">Best Time</div><div class="info-value" id="modalTime"></div></div>
        <div class="info-item"><div class="info-label">Spice Level</div><div class="info-value" id="modalSpice"></div></div>
      </div>
      <div class="info-item" style="margin-top:15px;">
        <div class="info-label">Where to Find</div>
        <div class="info-value" id="modalLocation"></div>
      </div>
    </div>
  </div>
</div>

<script>
const foods = [
  { id:1, name:"Lumpia Semarang", emoji:"🥟", category:"snack", price:"Rp 10K-20K", desc:"Iconic spring roll filled with bamboo shoots, egg, shrimp, and chicken. The signature dish of Semarang with a unique sweet-savory taste.", origin:"Semarang (Chinese-Javanese fusion)", time:"Anytime", spice:"Mild 🌶️", location:"Lumpia Gang Lombok, Lumpia Mbak Lien" },
  { id:2, name:"Tahu Gimbal", emoji:"🍤", category:"main", price:"Rp 15K-25K", desc:"Tofu served with shrimp fritters (gimbal), cabbage, bean sprouts, and peanut sauce with sweet soy sauce dressing.", origin:"Semarang", time:"Lunch/Dinner", spice:"Medium 🌶️🌶️", location:"Tahu Gimbal Pak Edy, Simpang Lima area" },
  { id:3, name:"Soto Semarang", emoji:"🍲", category:"main", price:"Rp 12K-20K", desc:"Clear chicken soup with rice, bean sprouts, and fried shallots. Light and refreshing broth perfect for any time.", origin:"Semarang", time:"Breakfast/Lunch", spice:"Mild 🌶️", location:"Soto Bangkong, Soto Bokoran" },
  { id:4, name:"Bandeng Presto", emoji:"🐟", category:"main", price:"Rp 25K-50K", desc:"Pressure-cooked milkfish with tender bones you can eat whole. A famous Semarang souvenir and delicacy.", origin:"Semarang", time:"Lunch/Dinner", spice:"Mild 🌶️", location:"Bandeng Juwana, Bandeng Presto Pak Yon" },
  { id:5, name:"Wingko Babat", emoji:"🥮", category:"dessert", price:"Rp 3K-10K", desc:"Sweet coconut pancake made from glutinous rice and grated coconut. Crispy outside, chewy inside.", origin:"Babat, popular in Semarang", time:"Snack time", spice:"None", location:"Wingko Babat Cap Kereta Api" },
  { id:6, name:"Es Puter Cong Lik", emoji:"🍨", category:"dessert", price:"Rp 10K-20K", desc:"Traditional Indonesian ice cream made with coconut milk. Legendary since 1960s in Semarang.", origin:"Semarang", time:"Afternoon", spice:"None", location:"Jl. KH Ahmad Dahlan" },
  { id:7, name:"Nasi Ayam Semarang", emoji:"🍚", category:"main", price:"Rp 15K-25K", desc:"Rice with chicken in rich coconut gravy, similar to nasi liwet but with distinct Semarang flavors.", origin:"Semarang", time:"Breakfast/Dinner", spice:"Medium 🌶️🌶️", location:"Nasi Ayam Bu Sami, Nasi Ayam Bu Nyoto" },
  { id:8, name:"Mie Kopyok", emoji:"🍜", category:"main", price:"Rp 10K-18K", desc:"Yellow noodles with tofu, crackers, bean sprouts, and sweet-savory broth. A comforting local favorite.", origin:"Semarang", time:"Lunch", spice:"Mild 🌶️", location:"Mie Kopyok Pak Dhuwur" },
  { id:9, name:"Ganjel Rel", emoji:"🍞", category:"snack", price:"Rp 5K-15K", desc:"Traditional brown sugar bread with sesame seeds, shaped like railway ties (hence the name).", origin:"Semarang (Dutch colonial era)", time:"Snack", spice:"None", location:"Toko Oen, traditional markets" },
  { id:10, name:"Es Cao", emoji:"🥤", category:"drink", price:"Rp 5K-10K", desc:"Refreshing grass jelly drink with coconut milk and palm sugar syrup. Perfect for hot days.", origin:"Semarang", time:"Afternoon", spice:"None", location:"Street vendors in old town" },
  { id:11, name:"Tahu Pong", emoji:"🥟", category:"snack", price:"Rp 10K-20K", desc:"Hollow fried tofu served with egg, sweet soy sauce, and chili. Crispy outside, empty inside.", origin:"Semarang", time:"Anytime", spice:"Medium 🌶️🌶️", location:"Tahu Pong Karangsaru, Gajahmada" },
  { id:12, name:"Gado-Gado Semarang", emoji:"🥗", category:"main", price:"Rp 12K-20K", desc:"Vegetable salad with peanut sauce, Semarang style with unique additions and flavors.", origin:"Java (Semarang variant)", time:"Lunch", spice:"Medium 🌶️🌶️", location:"Various warungs citywide" },
  { id:13, name:"Roti Gandjel Rel", emoji:"🥖", category:"snack", price:"Rp 8K-15K", desc:"Dutch-influenced sweet bread with unique texture, a nostalgic colonial-era treat.", origin:"Semarang", time:"Breakfast/Snack", spice:"None", location:"Toko Oen, Dhaup bakery" },
  { id:14, name:"Sate Sapi Pak Kempleng", emoji:"🍢", category:"main", price:"Rp 25K-40K", desc:"Tender beef satay with rich peanut sauce, a must-try Semarang favorite since decades.", origin:"Semarang", time:"Dinner", spice:"Medium 🌶️🌶️", location:"Sate Pak Kempleng Ungaran" },
  { id:15, name:"Wedang Tahu", emoji:"☕", category:"drink", price:"Rp 5K-10K", desc:"Warm silken tofu in ginger syrup, a traditional warming dessert-drink.", origin:"Semarang (Chinese influence)", time:"Morning/Evening", spice:"Mild ginger", location:"Jl. Gajahmada, Pecinan area" }
];

let favorites = JSON.parse(localStorage.getItem('semarangFavs') || '[]');
let currentFilter = 'all';
let currentSearch = '';

function render() {
  const grid = document.getElementById('grid');
  let filtered = foods.filter(f => {
    const matchSearch = f.name.toLowerCase().includes(currentSearch) || f.desc.toLowerCase().includes(currentSearch);
    const matchFilter = currentFilter === 'all' ? true : currentFilter === 'favorites' ? favorites.includes(f.id) : f.category === currentFilter;
    return matchSearch && matchFilter;
  });
  
  document.getElementById('totalCount').textContent = foods.length;
  document.getElementById('favCount').textContent = favorites.length;
  document.getElementById('shownCount').textContent = filtered.length;
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">🔍 No dishes found. Try different keywords!</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(f => `
    <div class="card" onclick="openModal(${f.id})">
      <div class="card-image">${f.emoji}</div>
      <div class="card-content">
        <h3 class="card-title">${f.name}</h3>
        <span class="card-category">${f.category.toUpperCase()}</span>
        <p class="card-desc">${f.desc.substring(0, 80)}...</p>
        <div class="card-footer">
          <span class="price">${f.price}</span>
          <button class="fav-btn" onclick="event.stopPropagation(); toggleFav(${f.id})">${favorites.includes(f.id) ? '❤️' : '🤍'}</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFav(id) {
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('semarangFavs', JSON.stringify(favorites));
  render();
}

function openModal(id) {
  const f = foods.find(x => x.id === id);
  document.getElementById('modalEmoji').textContent = f.emoji;
  document.getElementById('modalTitle').textContent = f.name;
  document.getElementById('modalCategory').textContent = f.category.toUpperCase();
  document.getElementById('modalDesc').textContent = f.desc;
  document.getElementById('modalPrice').textContent = f.price;
  document.getElementById('modalOrigin').textContent = f.origin;
  document.getElementById('modalTime').textContent = f.time;
  document.getElementById('modalSpice').textContent = f.spice;
  document.getElementById('modalLocation').textContent = f.location;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

render();
</script>

</body>
</html>
